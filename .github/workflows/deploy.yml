name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Build WASM
        run: bash scripts/build-wasm.sh

      - name: Install shade-ui dependencies
        run: bun install
        working-directory: shade-ui

      - name: Install shade-web dependencies
        run: bun install
        working-directory: shade-web

      - name: Build shade-web
        run: bun run build
        working-directory: shade-web

      - name: Copy shade-web into website
        run: |
          mkdir -p website/public/app
          cp -r shade-web/dist/shade/. website/public/app/

      - name: Install website dependencies
        run: bun install
        working-directory: website

      - name: Build website
        run: bun run build
        working-directory: website

      - name: Deploy to Vercel
        run: bunx vercel deploy --prebuilt --prod
        working-directory: website
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_OIDC_TOKEN: ${{ secrets.VERCEL_OIDC_TOKEN }}
