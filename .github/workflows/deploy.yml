name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-24.04
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Build WASM
        run: bash scripts/build-wasm.sh

      - name: Install shade-ui dependencies
        run: bun install
        working-directory: shade-ui

      - name: Install shade-web dependencies
        run: bun install
        working-directory: shade-web

      - name: Build shade-web
        run: bun run build
        working-directory: shade-web

      - name: Copy shade-web into website
        run: |
          mkdir -p website/public/app
          cp -r shade-web/dist/shade/. website/public/app/

      - name: Install website dependencies
        run: bun install
        working-directory: website

      - name: Deploy to Vercel
        run: vercel deploy --prod --token="$VERCEL_TOKEN"
        working-directory: website
