version: "3"

tasks:
  ui:dev:
    desc: Start the UI dev server
    dir: shade-ui
    cmd: bun run dev

  ui:build:
    desc: Build the UI for production
    dir: shade-ui
    cmd: bun run build

  web:dev:
    desc: Start the web-only wasm UI
    dir: web
    cmd: bun run dev

  web:build:
    desc: Build the web-only wasm UI
    dir: web
    cmd: bun run build

  web:wasm:
    desc: Build the wasm bundle consumed by the web UI
    dir: web
    cmd: bun run build:wasm

  website:build:
    desc: Build the website
    dir: website
    cmds: 
      - task: web:wasm
      - task: web:build
      - bun run build
      - mv ../web/dist dist/app

  dev:
    desc: Start the Tauri dev environment
    dir: shade-tauri
    cmd: cargo tauri dev
